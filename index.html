<!DOCTYPE html>
<html lang="de" data-theme="emerald">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiIon Battery Configurator</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='20' y='30' width='60' height='50' rx='5' fill='%2310b981'/><rect x='40' y='20' width='20' height='10' rx='2' fill='%23059669'/><path d='M40 55h20M50 45v20' stroke='white' stroke-width='8' stroke-linecap='round'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        .battery-grid { display: grid; gap: 2px; }
        .cell { border-radius: 50%; border: 1px solid #ccc; }
        .is-invalid { stroke: red; stroke-width: 3; fill: #fee2e2; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background-color: oklch(var(--b2)) !important; }
        .collapse-title { cursor: pointer; }
        .sortable { cursor: pointer; user-select: none; }
        .sortable:hover { background-color: oklch(var(--b2)); }
    </style>
</head>
<body class="bg-base-200 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-primary">LiIon Configurator</h1>
            <div class="flex gap-2">
                <button onclick="exportData()" class="btn btn-outline btn-sm">Export JSON</button>
                <label class="btn btn-outline btn-sm">
                    Import JSON
                    <input type="file" class="hidden" onchange="importData(event)" accept=".json">
                </label>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <!-- Cell Editor -->
                <div class="card bg-base-100 shadow-xl overflow-visible border border-base-300">
                    <div class="collapse collapse-arrow">
                        <input type="checkbox" checked /> 
                        <div class="collapse-title flex items-center">
                            <h2 class="text-lg font-bold">Zellen</h2>
                        </div>
                        <div class="collapse-content">
                            <div class="form-control w-full">
                                <label class="label"><span class="label-text text-xs">Zelle wählen</span></label>
                                <select id="editor-cell-select" class="select select-bordered w-full" onchange="loadCellToEditor()"></select>
                            </div>
                            <div class="divider text-xs">Bearbeiten / Neu</div>
                            <div class="form-control w-full">
                                <label class="label">
                                    <span class="label-text">Zellen Name</span>
                                    <div class="flex gap-2 text-xs">
                                        <a id="cell-link-google" href="#" target="_blank" class="link link-primary font-bold">Google ↗</a>
                                        <a id="cell-link-lygte" href="#" target="_blank" class="link link-secondary font-bold">Lygte ↗</a>
                                        <a id="cell-link-custom" href="#" target="_blank" class="link link-accent font-bold hidden">Link ↗</a>
                                    </div>
                                </label>
                                <input type="text" id="cell-name" placeholder="Samsung 30Q" class="input input-bordered w-full" />
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Preis (€/Stk)</span></label>
                                    <input type="number" id="cell-price" step="0.01" value="5.00" class="input input-bordered w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Preis/Stk @ 100 (€)</span></label>
                                    <input type="number" id="cell-price100" step="0.01" value="4.50" class="input input-bordered w-full" />
                                </div>
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text text-xs font-bold">Kapazität (mAh)</span></label>
                                <input type="number" id="cell-cap" value="3000" class="input input-bordered w-full" />
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Dauerstrom (A)</span></label>
                                    <input type="number" id="cell-cont" value="15" class="input input-bordered w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Max Strom (A)</span></label>
                                    <input type="number" id="cell-max" value="30" class="input input-bordered w-full" />
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs font-bold">Format</span></label>
                                    <select id="cell-format" class="select select-bordered w-full"></select>
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs font-bold">Eigener Link</span></label>
                                    <input type="url" id="cell-custom-link" placeholder="https://..." class="input input-bordered w-full" oninput="updateCellLinksFromInput()" />
                                </div>
                            </div>
                            <div class="form-control w-full">
                                <label class="label"><span class="label-text">Notizen</span></label>
                                <textarea id="cell-notes" class="textarea textarea-bordered h-20" placeholder="z.B. Bezugsquelle..."></textarea>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="newCell()" class="btn btn-outline btn-sm flex-1">Neu</button>
                                <button onclick="addCell()" class="btn btn-primary btn-sm flex-1">Speichern</button>
                                <button onclick="deleteCell()" class="btn btn-error btn-outline btn-sm flex-1">Löschen</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Format Editor -->
                <div class="card bg-base-100 shadow-xl overflow-visible border border-base-300">
                    <div class="collapse collapse-arrow">
                        <input type="checkbox" /> 
                        <div class="collapse-title flex items-center">
                            <h2 class="text-lg font-bold">Zell-Formate</h2>
                        </div>
                        <div class="collapse-content">
                            <div class="form-control w-full">
                                <select id="editor-format-select" class="select select-bordered select-sm w-full" onchange="loadFormatToEditor()"></select>
                            </div>
                            <div class="divider text-xs">Neu / Edit</div>
                            <div class="form-control">
                                <label class="label"><span class="label-text text-xs">Name (z.B. 21700)</span></label>
                                <input type="text" id="format-name" class="input input-bordered input-sm w-full" />
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Grid H</span></label>
                                    <input type="number" id="format-gridH" step="0.1" class="input input-bordered input-sm w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Grid V</span></label>
                                    <input type="number" id="format-gridV" step="0.1" class="input input-bordered input-sm w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Grid Honey</span></label>
                                    <input type="number" id="format-honeyV" step="0.1" class="input input-bordered input-sm w-full" />
                                </div>
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text text-xs font-bold">Zell-Höhe</span></label>
                                <input type="number" id="format-height" step="0.1" class="input input-bordered input-sm w-full" />
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="newFormat()" class="btn btn-outline btn-xs flex-1">Neu</button>
                                <button onclick="addFormat()" class="btn btn-primary btn-xs flex-1">Speichern</button>
                                <button onclick="deleteFormat()" class="btn btn-error btn-outline btn-xs flex-1">Löschen</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Case Editor -->
                <div class="card bg-base-100 shadow-xl overflow-visible border border-base-300">
                    <div class="collapse collapse-arrow">
                        <input type="checkbox" /> 
                        <div class="collapse-title flex items-center">
                            <h2 class="text-lg font-bold">Gehäuse</h2>
                        </div>
                        <div class="collapse-content">
                            <div class="form-control w-full">
                                <select id="editor-case-select" class="select select-bordered w-full" onchange="loadCaseToEditor()"></select>
                            </div>
                            <div class="divider">Bearbeiten / Neu</div>
                            <div class="form-control w-full">
                                <label class="label">
                                    <span class="label-text text-sm">Gehäuse Name</span>
                                    <a id="case-link-url" href="#" target="_blank" class="label-text-alt link link-primary font-bold hidden">Link ↗</a>
                                </label>
                                <input type="text" id="case-name" placeholder="Pelicase 1200" class="input input-bordered w-full" />
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">L (innen)</span></label>
                                    <input type="number" id="case-l" value="250" class="input input-bordered w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">B (innen)</span></label>
                                    <input type="number" id="case-w" value="200" class="input input-bordered w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">H (innen)</span></label>
                                    <input type="number" id="case-h" value="70" class="input input-bordered w-full" />
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs">Preis (€)</span></label>
                                    <input type="number" id="case-price" step="0.01" value="45.00" class="input input-bordered w-full" />
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text text-xs font-bold">URL</span></label>
                                    <input type="url" id="case-url" placeholder="https://..." class="input input-bordered w-full" oninput="updateCaseLinksFromInput()" />
                                </div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="newCase()" class="btn btn-outline btn-sm flex-1">Neu</button>
                                <button onclick="addCase()" class="btn btn-primary btn-sm flex-1">Speichern</button>
                                <button onclick="deleteCase()" class="btn btn-error btn-outline btn-sm flex-1">Löschen</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pack & Vis Column -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Pack Config -->
                <div class="card bg-base-100 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Konfiguration</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-4">
                                <div class="form-control">
                                    <label class="label"><span class="label-text font-bold text-sm">Name</span></label>
                                    <input type="text" id="pack-name" placeholder="Mein Setup" class="input input-bordered w-full" />
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="form-control">
                                        <label class="label"><span class="label-text font-bold text-sm">Zelle</span></label>
                                        <select id="cell-select" class="select select-bordered w-full" onchange="updateCalc()"></select>
                                    </div>
                                    <div class="form-control">
                                        <label class="label"><span class="label-text font-bold text-sm">Gehäuse</span></label>
                                        <select id="case-select" class="select select-bordered w-full" onchange="updateCalc()"></select>
                                    </div>
                                </div>
                                <div class="grid grid-cols-4 gap-2 text-center">
                                    <div class="form-control">
                                        <label class="label justify-center"><span class="label-text">S</span></label>
                                        <input type="number" id="pack-s" value="20" class="input input-bordered w-full" onchange="updateCalc()" />
                                    </div>
                                    <div class="form-control">
                                        <label class="label justify-center"><span class="label-text">P</span></label>
                                        <input type="number" id="pack-p" value="3" class="input input-bordered w-full" onchange="updateCalc()" />
                                    </div>
                                    <div class="form-control">
                                        <label class="label justify-center"><span class="label-text">L-Reihe</span></label>
                                        <input type="number" id="layout-rows" value="20" class="input input-bordered w-full" onchange="updateCalc()" />
                                    </div>
                                    <div class="form-control">
                                        <label class="label justify-center"><span class="label-text text-xs">Typ</span></label>
                                        <select id="layout-type" class="select select-bordered w-full" onchange="updateCalc()">
                                            <option value="grid">Grid</option>
                                            <option value="honey">Honey</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-control">
                                    <label class="label"><span class="label-text font-bold text-xs">Leistung (W)</span></label>
                                    <input type="number" id="pack-power" value="3000" class="input input-bordered input-sm w-full" onchange="updateCalc()" />
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div class="form-control">
                                    <label class="label"><span class="label-text font-bold text-sm">Notizen</span></label>
                                    <textarea id="pack-notes" class="textarea textarea-bordered h-full min-h-[150px]" placeholder="Konfig Details..."></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions justify-end mt-4">
                            <button onclick="saveComparison()" class="btn btn-secondary btn-sm px-8">Speichern</button>
                        </div>
                    </div>
                </div>

                <!-- Result Stats -->
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <div class="stats shadow bg-base-100 border border-base-300"><div class="stat px-4 py-2"><div class="stat-title text-xs">Zellen</div><div id="res-total-cells" class="stat-value text-lg">-</div></div></div>
                    <div class="stats shadow bg-base-100 border border-base-300"><div class="stat px-4 py-2"><div class="stat-title text-xs">Volt</div><div id="res-volt" class="stat-value text-lg">-</div></div></div>
                    <div class="stats shadow bg-base-100 border border-base-300"><div class="stat px-4 py-2"><div class="stat-title text-xs">Energie</div><div id="res-cap" class="stat-value text-lg">-</div><div id="res-wh" class="stat-desc text-xs">-</div></div></div>
                    <div class="stats shadow bg-base-100 border border-base-300"><div class="stat px-4 py-2"><div class="stat-title text-xs">Last/Strom</div><div id="res-util" class="stat-value text-lg">-</div><div id="res-cont" class="stat-desc text-xs">-</div></div></div>
                    <div class="stats shadow bg-base-100 border border-base-300"><div class="stat px-4 py-2"><div class="stat-title text-xs">Kosten</div><div id="res-cost" class="stat-value text-lg">-</div><div id="res-weight-costkwh" class="stat-desc text-xs">-</div></div></div>
                </div>

                <!-- SVG Visualizer -->
                <div class="card bg-base-100 shadow-xl overflow-hidden border border-base-300">
                    <div class="card-body p-2">
                        <div class="flex justify-between items-center mb-2 px-2">
                            <h2 class="card-title text-sm">Vorschau (mm)</h2>
                            <div class="flex gap-2 mr-auto ml-4">
                                <div id="area-util" class="badge badge-outline badge-sm">0% Fläche</div>
                                <div id="vol-util" class="badge badge-outline badge-sm">0% Volumen</div>
                            </div>
                            <div id="dim-warning" class="badge badge-error hidden">ZU GROSS!</div>
                        </div>
                        <div class="bg-gray-100 flex items-center justify-center min-h-[400px] border rounded p-4">
                            <svg id="visualizer" viewBox="0 0 300 300" class="max-w-full max-h-[500px] drop-shadow-md"></svg>
                        </div>
                    </div>
                </div>

                <!-- Comparison -->
                <div class="card bg-base-100 shadow-xl border border-base-300">
                    <div class="card-body">
                        <h2 class="card-title text-sm">Vergleich</h2>
                        <div class="overflow-x-auto mt-4">
                            <table class="table table-zebra w-full text-xs">
                                <thead>
                                    <tr>
                                        <th class="sortable" onclick="sortComparisons('name')">Name <span id="sort-name"></span></th>
                                        <th class="sortable" onclick="sortComparisons('s')">Konfig <span id="sort-s"></span></th>
                                        <th class="sortable" onclick="sortComparisons('loadPercent')">Last <span id="sort-loadPercent"></span></th>
                                        <th class="sortable" onclick="sortComparisons('areaUtil')">Fläche <span id="sort-areaUtil"></span></th>
                                        <th class="sortable" onclick="sortComparisons('volUtil')">Volumen <span id="sort-volUtil"></span></th>
                                        <th class="sortable" onclick="sortComparisons('wh')">Energie <span id="sort-wh"></span></th>
                                        <th class="sortable" onclick="sortComparisons('cost')">Kosten <span id="sort-cost"></span></th>
                                        <th>Links</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="comp-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cells = JSON.parse(localStorage.getItem('battCells') || '[]');
        let cases = JSON.parse(localStorage.getItem('battCases') || '[]');
        let formats = JSON.parse(localStorage.getItem('battFormats') || '[]');
        let comparisons = JSON.parse(localStorage.getItem('battComps') || '[]');
        let sortState = { column: null, direction: 'asc' };

        function init() {
            if (!Array.isArray(cells)) cells = [];
            if (!Array.isArray(cases)) cases = [];
            if (!Array.isArray(formats)) formats = [];
            if (!Array.isArray(comparisons)) comparisons = [];

            if (formats.length === 0) {
                formats.push({ id: 1, name: '18650', gridH: 19.5, gridV: 19.5, height: 65, honeyV: 17.5 });
                formats.push({ id: 2, name: '21700', gridH: 22.5, gridV: 22.5, height: 70, honeyV: 19.5 });
            }
            if (cells.length === 0) cells.push({ id: 1, name: 'Samsung 30Q', price: 5, price100: 4.5, cap: 3000, cont: 15, max: 30, formatId: 1 });
            if (cases.length === 0) cases.push({ id: 1, name: 'Manuell', l: 250, w: 200, h: 70, price: 0, url: '' });
            
            renderFormatSelects();
            renderCellSelects();
            renderCaseSelects();
            loadCellToEditor();
            loadFormatToEditor();
            loadCaseToEditor();
            updateCalc();
            renderComparisons();
        }

        function renderFormatSelects() {
            const options = formats.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
            document.getElementById('editor-format-select').innerHTML = options;
            document.getElementById('cell-format').innerHTML = options;
        }

        function renderCellSelects() {
            const options = cells.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
            document.getElementById('editor-cell-select').innerHTML = options;
            document.getElementById('cell-select').innerHTML = options;
        }

        function renderCaseSelects() {
            const options = cases.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
            document.getElementById('editor-case-select').innerHTML = options;
            document.getElementById('case-select').innerHTML = options;
        }

        // --- Format Logic ---
        function loadFormatToEditor() {
            const format = formats.find(f => f.id == document.getElementById('editor-format-select').value);
            if (!format) return;
            document.getElementById('format-name').value = format.name;
            document.getElementById('format-gridH').value = format.gridH;
            document.getElementById('format-gridV').value = format.gridV;
            document.getElementById('format-height').value = format.height;
            document.getElementById('format-honeyV').value = format.honeyV || (format.gridV * 0.866).toFixed(1);
        }
        function newFormat() { 
            document.getElementById('format-name').value = ''; 
            document.getElementById('format-gridH').value = 22.5;
            document.getElementById('format-gridV').value = 22.5;
            document.getElementById('format-height').value = 70;
            document.getElementById('format-honeyV').value = 19.5;
        }
        function addFormat() {
            const format = { 
                id: Date.now(), 
                name: document.getElementById('format-name').value || 'Unbenannt',
                gridH: parseFloat(document.getElementById('format-gridH').value),
                gridV: parseFloat(document.getElementById('format-gridV').value),
                height: parseFloat(document.getElementById('format-height').value),
                honeyV: parseFloat(document.getElementById('format-honeyV').value)
            };
            const idx = formats.findIndex(f => f.name === format.name);
            if (idx >= 0) { format.id = formats[idx].id; formats[idx] = format; } else formats.push(format);
            localStorage.setItem('battFormats', JSON.stringify(formats));
            renderFormatSelects();
        }
        function deleteFormat() {
            const id = document.getElementById('editor-format-select').value;
            if (formats.length <= 1 || !confirm("Löschen?")) return;
            formats = formats.filter(f => f.id != id);
            localStorage.setItem('battFormats', JSON.stringify(formats));
            renderFormatSelects(); loadFormatToEditor();
        }

        // --- Cell Logic ---
        function loadCellToEditor() {
            const cell = cells[document.getElementById('editor-cell-select').value];
            if (!cell) return;
            document.getElementById('cell-name').value = cell.name;
            document.getElementById('cell-price').value = cell.price;
            document.getElementById('cell-price100').value = cell.price100;
            document.getElementById('cell-cap').value = cell.cap;
            document.getElementById('cell-cont').value = cell.cont;
            document.getElementById('cell-max').value = cell.max;
            document.getElementById('cell-format').value = cell.formatId;
            document.getElementById('cell-custom-link').value = cell.customLink || '';
            document.getElementById('cell-notes').value = cell.notes || '';
            updateCellLinks(cell.name, cell.customLink);
        }
        function newCell() { document.getElementById('cell-name').value = ''; document.getElementById('cell-notes').value = ''; document.getElementById('cell-custom-link').value = ''; updateCellLinks('', ''); }
        function addCell() {
            const cellData = { id: Date.now(), name: document.getElementById('cell-name').value || 'Unbekannt', price: parseFloat(document.getElementById('cell-price').value), price100: parseFloat(document.getElementById('cell-price100').value), cap: parseFloat(document.getElementById('cell-cap').value), cont: parseFloat(document.getElementById('cell-cont').value), max: parseFloat(document.getElementById('cell-max').value), notes: document.getElementById('cell-notes').value, formatId: parseInt(document.getElementById('cell-format').value), customLink: document.getElementById('cell-custom-link').value };
            const idx = cells.findIndex(c => c.name === cellData.name);
            if (idx >= 0) cells[idx] = cellData; else cells.push(cellData);
            localStorage.setItem('battCells', JSON.stringify(cells));
            renderCellSelects(); updateCalc();
        }
        function deleteCell() {
            const idx = document.getElementById('editor-cell-select').value;
            if (cells.length <= 1 || !confirm("Löschen?")) return;
            cells.splice(idx, 1);
            localStorage.setItem('battCells', JSON.stringify(cells));
            renderCellSelects(); loadCellToEditor(); updateCalc();
        }
        function updateCellLinks(name, custom) {
            document.getElementById('cell-link-google').href = name ? `https://www.google.com/search?q=${encodeURIComponent(name)}` : '#';
            document.getElementById('cell-link-lygte').href = name ? `https://www.google.com/search?q=site:lygte-info.dk+${encodeURIComponent(name)}` : '#';
            const cLink = document.getElementById('cell-link-custom');
            if (custom) { cLink.href = custom; cLink.classList.remove('hidden'); } else { cLink.classList.add('hidden'); }
        }
        function updateCellLinksFromInput() {
            updateCellLinks(document.getElementById('cell-name').value, document.getElementById('cell-custom-link').value);
        }

        // --- Case Logic ---
        function loadCaseToEditor() {
            const c = cases[document.getElementById('editor-case-select').value];
            if (!c) return;
            document.getElementById('case-name').value = c.name;
            document.getElementById('case-l').value = c.l;
            document.getElementById('case-w').value = c.w;
            document.getElementById('case-h').value = c.h;
            document.getElementById('case-price').value = c.price;
            document.getElementById('case-url').value = c.url || '';
            updateCaseLinks(c.url);
        }
        function newCase() { document.getElementById('case-name').value = ''; document.getElementById('case-url').value = ''; updateCaseLinks(''); }
        function addCase() {
            const caseData = { id: Date.now(), name: document.getElementById('case-name').value || 'Box', l: parseFloat(document.getElementById('case-l').value), w: parseFloat(document.getElementById('case-w').value), h: parseFloat(document.getElementById('case-h').value), price: parseFloat(document.getElementById('case-price').value), url: document.getElementById('case-url').value };
            const idx = cases.findIndex(c => c.name === caseData.name);
            if (idx >= 0) cases[idx] = caseData; else cases.push(caseData);
            localStorage.setItem('battCases', JSON.stringify(cases));
            renderCaseSelects(); updateCalc();
        }
        function deleteCase() {
            const idx = document.getElementById('editor-case-select').value;
            if (cells.length <= 1 || !confirm("Löschen?")) return;
            cases.splice(idx, 1);
            localStorage.setItem('battCases', JSON.stringify(cases));
            renderCaseSelects(); loadCaseToEditor(); updateCalc();
        }
        function updateCaseLinks(url) {
            const link = document.getElementById('case-link-url');
            if (url) { link.href = url; link.classList.remove('hidden'); } else { link.classList.add('hidden'); }
        }
        function updateCaseLinksFromInput() {
            updateCaseLinks(document.getElementById('case-url').value);
        }

        // --- Calculator ---
        function updateCalc() {
            try {
                const cellIdx = document.getElementById('cell-select').value;
                const cell = cells[cellIdx];
                const packCaseIdx = document.getElementById('case-select').value;
                const packCase = cases[packCaseIdx];
                const power = parseFloat(document.getElementById('pack-power').value) || 0;
                if (!cell || !packCase) return;
                const format = formats.find(f => f.id == cell.formatId) || formats[0];

                const s = parseInt(document.getElementById('pack-s').value) || 0;
                const p = parseInt(document.getElementById('pack-p').value) || 0;
                const totalCells = s * p;
                document.getElementById('res-total-cells').innerText = `${totalCells}`;

                const packVolt = s * 3.7;
                const nominalWh = packVolt * p * cell.cap / 1000;
                const packContA = p * cell.cont;
                const reqA = packVolt > 0 ? (power / packVolt) : 0;
                const loadPercent = packContA > 0 ? Math.round((reqA / packContA) * 100) : 0;

                document.getElementById('res-volt').innerText = packVolt.toFixed(1) + 'V';
                document.getElementById('res-cap').innerText = (p * cell.cap / 1000).toFixed(1) + 'Ah';
                document.getElementById('res-wh').innerText = Math.round(nominalWh) + 'Wh';
                
                document.getElementById('res-util').innerText = `${loadPercent}% Last`;
                document.getElementById('res-cont').innerText = `${reqA.toFixed(1)}A / ${packContA}A`;
                
                const cost = Math.round(totalCells * (totalCells >= 100 ? cell.price100 : cell.price) + packCase.price);
                const priceKwh = nominalWh > 0 ? Math.round(cost / (nominalWh / 1000)) : 0;
                document.getElementById('res-cost').innerText = cost + '€';
                document.getElementById('res-weight-costkwh').innerText = `${priceKwh}€/kWh | Geh. inkl.`;

                const lRows = parseInt(document.getElementById('layout-rows').value) || totalCells;
                const lCols = Math.ceil(totalCells / lRows);
                const isHoney = document.getElementById('layout-type').value === 'honey';

                let packL = lRows * format.gridH;
                let packW = lCols * format.gridV;
                const visualDia = format.dia || (format.gridH - 1.1);
                if (isHoney) {
                    packL = (lRows + 0.5) * format.gridH;
                    packW = (lCols - 1) * format.honeyV + visualDia;
                }

                const caseArea = packCase.l * packCase.w;
                const packArea = packL * packW;
                const areaUtil = caseArea > 0 ? Math.round((packArea / caseArea) * 100) : 0;
                document.getElementById('area-util').innerText = `${areaUtil}% Fläche`;

                const caseVol = caseArea * packCase.h;
                const packVolVal = packArea * format.height;
                const volUtil = caseVol > 0 ? Math.round((packVolVal / caseVol) * 100) : 0;
                document.getElementById('vol-util').innerText = `${volUtil}% Volumen`;

                const tooBig = packL > packCase.l || packW > packCase.w || format.height > packCase.h;
                document.getElementById('dim-warning').classList.toggle('hidden', !tooBig);

                const svg = document.getElementById('visualizer');
                const pad = 20;
                const vW = Math.max(packCase.l, packL) + pad * 2;
                const vH = Math.max(packCase.w, packW) + pad * 2;
                svg.setAttribute('viewBox', `0 0 ${vW} ${vH}`);

                // Calculate centering offsets
                const centerOffsetX = (packCase.l - packL) / 2;
                const centerOffsetY = (packCase.w - packW) / 2;

                let svgC = `<rect x="${pad}" y="${pad}" width="${packCase.l}" height="${packCase.w}" fill="none" stroke="#666" stroke-dasharray="5,5" /><text x="${pad}" y="${pad - 5}" font-size="12" fill="#666">${packCase.l}x${packCase.w}mm</text>`;
                const cellClass = tooBig ? 'is-invalid' : '';
                const cCol = tooBig ? '#fee2e2' : '#dcfce7';
                const sCol = tooBig ? '#ef4444' : '#22c55e';
                for(let i=0; i<totalCells; i++) {
                    const rIdx = i % lRows;
                    const cIdx = Math.floor(i / lRows);
                    let offX = 0;
                    if (isHoney && cIdx % 2 === 1) offX = format.gridH / 2;
                    
                    const cx = pad + centerOffsetX + rIdx * format.gridH + format.gridH/2 + offX;
                    const cy = pad + centerOffsetY + cIdx * (isHoney ? format.honeyV : format.gridV) + (isHoney ? visualDia/2 : format.gridV/2);
                    svgC += `<circle cx="${cx}" cy="${cy}" r="${visualDia/2 - 0.5}" fill="${cCol}" stroke="${sCol}" class="${cellClass}" />`;
                }
                svgC += `<text x="${pad}" y="${pad + packCase.w + 15}" font-size="12" font-weight="bold" fill="${tooBig ? 'red' : 'green'}">Pack: ${packL.toFixed(1)} x ${packW.toFixed(1)} x ${format.height}mm</text>`;
                svg.innerHTML = svgC;
            } catch (e) { console.error(e); }
        }

        function saveComparison() {
            const cellSelect = document.getElementById('cell-select');
            const caseSelect = document.getElementById('case-select');
            const cellIdx = cellSelect.value;
            const caseIdx = caseSelect.value;
            const cell = cells[cellIdx];
            const packCase = cases[caseIdx];
            const power = parseFloat(document.getElementById('pack-power').value) || 0;
            
            if (!cell || !packCase) return alert("Bitte eine Zelle wählen.");
            const format = formats.find(f => f.id == cell.formatId) || formats[0];

            const s = parseInt(document.getElementById('pack-s').value) || 0;
            const p = parseInt(document.getElementById('pack-p').value) || 0;
            const total = s * p;
            const packVolt = s * 3.7;
            const packContA = p * cell.cont;
            const reqA = packVolt > 0 ? (power / packVolt) : 0;
            const loadPercent = packContA > 0 ? Math.round((reqA / packContA) * 100) : 0;

            const lRows = parseInt(document.getElementById('layout-rows').value) || total;
            const lCols = Math.ceil(total / lRows);
            const isHoney = document.getElementById('layout-type').value === 'honey';
            let packL = lRows * format.gridH;
            let packW = lCols * format.gridV;
            const visualDia = format.dia || (format.gridH - 1.1);
            if (isHoney) {
                packL = (lRows + 0.5) * format.gridH;
                packW = (lCols - 1) * format.honeyV + visualDia;
            }
            const caseArea = packCase.l * packCase.w;
            const packArea = packL * packW;
            const areaUtil = caseArea > 0 ? Math.round((packArea / caseArea) * 100) : 0;
            const volUtil = (caseArea * packCase.h) > 0 ? Math.round((packArea * format.height / (caseArea * packCase.h)) * 100) : 0;

            comparisons.push({ 
                name: document.getElementById('pack-name').value || `${cell.name} ${s}S${p}P`, 
                cellIdx: parseInt(cellIdx), 
                caseIdx: parseInt(caseIdx), 
                s, p, power, loadPercent, areaUtil, volUtil,
                lRows: document.getElementById('layout-rows').value, 
                lType: document.getElementById('layout-type').value, 
                wh: Math.round(packVolt * p * cell.cap / 1000), 
                cost: Math.round(total * (total >= 100 ? cell.price100 : cell.price) + packCase.price), 
                notes: document.getElementById('pack-notes').value 
            });
            localStorage.setItem('battComps', JSON.stringify(comparisons));
            renderComparisons();
        }

        function loadComparison(i) {
            const c = comparisons[i];
            if (!c) return;
            document.getElementById('pack-name').value = c.name;
            document.getElementById('cell-select').value = c.cellIdx;
            document.getElementById('case-select').value = c.caseIdx;
            document.getElementById('pack-s').value = c.s;
            document.getElementById('pack-p').value = c.p;
            document.getElementById('pack-power').value = c.power || 3000;
            document.getElementById('layout-rows').value = c.lRows;
            document.getElementById('layout-type').value = c.lType;
            document.getElementById('pack-notes').value = c.notes || '';
            updateCalc();
        }

        function sortComparisons(column) {
            if (sortState.column === column) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.column = column;
                sortState.direction = 'asc';
            }
            
            comparisons.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                
                if (column === 'name') {
                    valA = (valA || '').toLowerCase();
                    valB = (valB || '').toLowerCase();
                }
                
                if (valA < valB) return sortState.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortState.direction === 'asc' ? 1 : -1;
                return 0;
            });
            
            renderComparisons();
        }

        function renderComparisons() {
            const list = document.getElementById('comp-list');
            if (!list) return;

            const columns = ['name', 's', 'loadPercent', 'areaUtil', 'volUtil', 'wh', 'cost'];
            columns.forEach(col => {
                const el = document.getElementById(`sort-${col}`);
                if (el) el.innerText = sortState.column === col ? (sortState.direction === 'asc' ? ' 🔼' : ' 🔽') : '';
            });

            list.innerHTML = comparisons.map((c, i) => {
                const cell = cells[c.cellIdx] || { name: '?' };
                const packCase = cases[c.caseIdx] || { url: '' };
                return `
                <tr onclick="loadComparison(${i})" class="clickable-row">
                    <td><div class="font-bold text-sm">${c.name}</div><div class="text-xs opacity-50">${c.notes || ''}</div></td>
                    <td>${c.s}S${c.p}P</td>
                    <td class="text-xs font-bold ${c.loadPercent > 100 ? 'text-error' : 'text-success'}">${c.loadPercent || 0}%</td>
                    <td class="text-xs">${c.areaUtil || 0}%</td>
                    <td class="text-xs">${c.volUtil || 0}%</td>
                    <td>${c.wh}Wh</td><td>${c.cost}€</td>
                    <td>
                        <div class="flex gap-1">
                            <a href="${cell.customLink || `https://www.google.com/search?q=${encodeURIComponent(cell.name)}`}" target="_blank" onclick="event.stopPropagation()" class="btn btn-ghost btn-xs">Cell</a>
                            ${packCase.url ? `<a href="${packCase.url}" target="_blank" onclick="event.stopPropagation()" class="btn btn-ghost btn-xs">Case</a>` : ''}
                        </div>
                    </td>
                    <td><button onclick="event.stopPropagation(); deleteComp(${i})" class="btn btn-ghost btn-xs text-error">✕</button></td>
                </tr>`;
            }).join('');
        }

        function deleteComp(i) { comparisons.splice(i, 1); localStorage.setItem('battComps', JSON.stringify(comparisons)); renderComparisons(); }
        function exportData() { const blob = new Blob([JSON.stringify({ cells, cases, formats, comparisons }, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'batt-config.json'; a.click(); }
        function importData(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); if(d.cells) cells = d.cells; if(d.cases) cases = d.cases; if(d.formats) formats = d.formats; if(d.comparisons) comparisons = d.comparisons; localStorage.setItem('battCells', JSON.stringify(cells)); localStorage.setItem('battCases', JSON.stringify(cases)); localStorage.setItem('battFormats', JSON.stringify(formats)); localStorage.setItem('battComps', JSON.stringify(comparisons)); init(); }; r.readAsText(f); }

        init();
    </script>
</body>
</html>
